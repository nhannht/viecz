services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: viecz-server
    env_file:
      - .env
    environment:
      GO_ENV: production
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_SSLMODE: disable
      FIREBASE_CREDENTIALS_FILE: /app/firebase-credentials.json
      MEILISEARCH_URL: http://meilisearch:7700
    volumes:
      - ./uploads:/app/uploads
      - ./server/firebase-credentials.json:/app/firebase-credentials.json:ro
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: viecz-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-viecz}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.16
    container_name: viecz-meilisearch-prod
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-}
    ports:
      - "127.0.0.1:7701:7700"
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped

volumes:
  postgres_data:
  meilisearch_data:
