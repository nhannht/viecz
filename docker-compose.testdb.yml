services:
  testdb:
    image: postgres:15-alpine
    container_name: viecz-testdb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: viecz_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    tmpfs:
      - /var/lib/postgresql/data

  meilisearch:
    image: getmeili/meilisearch:v1.16
    container_name: viecz-meilisearch
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development
    tmpfs:
      - /meili_data
    restart: unless-stopped
