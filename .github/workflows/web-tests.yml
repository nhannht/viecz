name: Angular Web Tests

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'web/**'
  pull_request:
    branches: [master]
    paths:
      - 'web/**'

jobs:
  tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bunx ng test --watch=false
