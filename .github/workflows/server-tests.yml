name: Go Server Tests

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'server/**'
  pull_request:
    branches: [master]
    paths:
      - 'server/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache-dependency-path: server/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1.6
          working-directory: server

  tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache-dependency-path: server/go.sum

      - name: Run tests
        run: >-
          go test -v -coverprofile=coverage.out
          ./internal/auth/...
          ./internal/config/...
          ./internal/handlers/...
          ./internal/logger/...
          ./internal/middleware/...
          ./internal/models/...
          ./internal/repository/...
          ./internal/services/...
        env:
          CGO_ENABLED: 1

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          awk -v c="$COVERAGE" 'BEGIN{if(c+0 < 55){print "::error::Coverage below 55%"; exit 1}}'

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: server/coverage.out
          retention-days: 14

  security:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache-dependency-path: server/go.sum

      - name: govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...
