name: Release Android to Firebase

on:
  push:
    tags:
      - 'android/*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # app-versioning plugin needs full git history + tags

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 -d > app/google-services.json

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > viecz-upload.jks

      - name: Create keystore.properties
        run: |
          cat > keystore.properties << EOF
          storeFile=../viecz-upload.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Decode Firebase service account
        run: echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}" | base64 -d > firebase-sa.json

      - name: Generate release notes
        working-directory: .  # run from repo root for git commands
        run: |
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git tag -l 'android/*' --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            git log --oneline "${PREV_TAG}..${CURRENT_TAG}" -- android/ server/ > release-notes.txt
          else
            echo "Initial release ${CURRENT_TAG}" > release-notes.txt
          fi

      - name: Build and upload to Firebase App Distribution
        env:
          GOOGLE_APPLICATION_CREDENTIALS: firebase-sa.json
        run: >
          ./gradlew assembleProdRelease appDistributionUploadProdRelease
          --releaseNotesFile=../release-notes.txt

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: viecz-${{ github.ref_name }}-release
          path: android/app/build/outputs/apk/prod/release/app-prod-release.apk
          retention-days: 90
