<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Three.js GLB Test — Glow Whale</title>
  <style>
    body { margin: 0; background: #0a0a12; overflow: hidden; }
    canvas { display: block; }
    #info { position: absolute; top: 10px; left: 10px; color: #fff; font: 14px monospace; white-space: pre-line; max-width: 400px; }
    #controls { position: absolute; top: 100px; left: 10px; color: #fff; font: 12px monospace; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 4px; }
    #controls label { display: block; margin: 4px 0; }
    #controls input[type=range] { width: 150px; vertical-align: middle; }
    #controls select { width: 200px; margin: 4px 0; }
  </style>
</head>
<body>
  <div id="info">Loading...</div>
  <div id="controls">
    <label>Animation: <select id="animSelect"></select></label>
    <label>Bloom Strength: <input type="range" id="bloomStrength" min="0" max="3" step="0.1" value="1.5"> <span id="bloomStrengthVal">1.5</span></label>
    <label>Bloom Radius: <input type="range" id="bloomRadius" min="0" max="1" step="0.05" value="0.7"> <span id="bloomRadiusVal">0.7</span></label>
    <label>Bloom Threshold: <input type="range" id="bloomThreshold" min="0" max="2" step="0.05" value="0.0"> <span id="bloomThresholdVal">0.0</span></label>
    <label>Exposure: <input type="range" id="exposure" min="0.1" max="3" step="0.1" value="1.0"> <span id="exposureVal">1.0</span></label>
    <label>Ambient: <input type="range" id="ambientIntensity" min="0" max="2" step="0.1" value="0.3"> <span id="ambientIntensityVal">0.3</span></label>
    <label>Key Light: <input type="range" id="keyLightIntensity" min="0" max="5" step="0.1" value="1.5"> <span id="keyLightIntensityVal">1.5</span></label>
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

    const infoEl = document.getElementById('info');
    const animSelect = document.getElementById('animSelect');
    const log = (msg) => { infoEl.textContent += msg + '\n'; console.log(msg); };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#0d0d1a');

    const ambientLight = new THREE.AmbientLight(0x303050, 0.3);
    scene.add(ambientLight);
    const keyLight = new THREE.DirectionalLight(0xddeeff, 1.5);
    keyLight.position.set(2, 4, 3);
    scene.add(keyLight);
    const fillLight = new THREE.DirectionalLight(0x4466aa, 0.3);
    fillLight.position.set(-2, -1, -2);
    scene.add(fillLight);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 500);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);

    // ---- Selective Bloom Setup ----
    // The trick: render bloom on everything, then composite so only
    // emissive parts get the bloom glow while the rest stays clean.

    const BLOOM_LAYER = 1;
    const bloomLayer = new THREE.Layers();
    bloomLayer.set(BLOOM_LAYER);

    // Dark material to mask non-emissive objects during bloom pass
    const darkMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
    const materials = {};

    function darkenNonBloomed(obj) {
      if (obj.isMesh && !bloomLayer.test(obj.layers)) {
        materials[obj.uuid] = obj.material;
        obj.material = darkMaterial;
      }
    }

    function restoreMaterial(obj) {
      if (materials[obj.uuid]) {
        obj.material = materials[obj.uuid];
        delete materials[obj.uuid];
      }
    }

    // Bloom composer — renders only emissive objects
    const bloomComposer = new EffectComposer(renderer);
    bloomComposer.renderToScreen = false;
    bloomComposer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      1.5,  // strength
      1.0,  // radius — maximum for dissolving geometry edges
      0.0   // threshold
    );
    // Override internal resolution to blur more aggressively
    // Default nMips=5, more passes = smoother
    bloomComposer.addPass(bloomPass);

    // Additional gaussian blur pass on the bloom result to fully dissolve rectangles
    const horizontalBlurShader = {
      uniforms: {
        tDiffuse: { value: null },
        h: { value: 2.0 / window.innerWidth },
      },
      vertexShader: `
        varying vec2 vUv;
        void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
      `,
      fragmentShader: `
        uniform sampler2D tDiffuse;
        uniform float h;
        varying vec2 vUv;
        void main() {
          vec4 sum = vec4(0.0);
          sum += texture2D(tDiffuse, vec2(vUv.x - 4.0*h, vUv.y)) * 0.051;
          sum += texture2D(tDiffuse, vec2(vUv.x - 3.0*h, vUv.y)) * 0.0918;
          sum += texture2D(tDiffuse, vec2(vUv.x - 2.0*h, vUv.y)) * 0.12245;
          sum += texture2D(tDiffuse, vec2(vUv.x - 1.0*h, vUv.y)) * 0.1531;
          sum += texture2D(tDiffuse, vec2(vUv.x,          vUv.y)) * 0.1633;
          sum += texture2D(tDiffuse, vec2(vUv.x + 1.0*h, vUv.y)) * 0.1531;
          sum += texture2D(tDiffuse, vec2(vUv.x + 2.0*h, vUv.y)) * 0.12245;
          sum += texture2D(tDiffuse, vec2(vUv.x + 3.0*h, vUv.y)) * 0.0918;
          sum += texture2D(tDiffuse, vec2(vUv.x + 4.0*h, vUv.y)) * 0.051;
          gl_FragColor = sum;
        }
      `,
    };
    const verticalBlurShader = {
      uniforms: {
        tDiffuse: { value: null },
        v: { value: 2.0 / window.innerHeight },
      },
      vertexShader: `
        varying vec2 vUv;
        void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
      `,
      fragmentShader: `
        uniform sampler2D tDiffuse;
        uniform float v;
        varying vec2 vUv;
        void main() {
          vec4 sum = vec4(0.0);
          sum += texture2D(tDiffuse, vec2(vUv.x, vUv.y - 4.0*v)) * 0.051;
          sum += texture2D(tDiffuse, vec2(vUv.x, vUv.y - 3.0*v)) * 0.0918;
          sum += texture2D(tDiffuse, vec2(vUv.x, vUv.y - 2.0*v)) * 0.12245;
          sum += texture2D(tDiffuse, vec2(vUv.x, vUv.y - 1.0*v)) * 0.1531;
          sum += texture2D(tDiffuse, vec2(vUv.x, vUv.y         )) * 0.1633;
          sum += texture2D(tDiffuse, vec2(vUv.x, vUv.y + 1.0*v)) * 0.1531;
          sum += texture2D(tDiffuse, vec2(vUv.x, vUv.y + 2.0*v)) * 0.12245;
          sum += texture2D(tDiffuse, vec2(vUv.x, vUv.y + 3.0*v)) * 0.0918;
          sum += texture2D(tDiffuse, vec2(vUv.x, vUv.y + 4.0*v)) * 0.051;
          gl_FragColor = sum;
        }
      `,
    };
    // Two extra blur passes to dissolve rectangle edges
    bloomComposer.addPass(new ShaderPass(horizontalBlurShader));
    bloomComposer.addPass(new ShaderPass(verticalBlurShader));
    bloomComposer.addPass(new ShaderPass(horizontalBlurShader));
    bloomComposer.addPass(new ShaderPass(verticalBlurShader));
    bloomComposer.addPass(new ShaderPass(horizontalBlurShader));
    bloomComposer.addPass(new ShaderPass(verticalBlurShader));

    // Additive blend shader — combines normal render + bloom
    const additiveBlendShader = {
      uniforms: {
        baseTexture: { value: null },
        bloomTexture: { value: null },
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform sampler2D baseTexture;
        uniform sampler2D bloomTexture;
        varying vec2 vUv;
        void main() {
          gl_FragColor = texture2D(baseTexture, vUv) + texture2D(bloomTexture, vUv);
        }
      `,
    };

    // Final composer — normal render + bloom overlay
    const finalComposer = new EffectComposer(renderer);
    finalComposer.addPass(new RenderPass(scene, camera));
    const blendPass = new ShaderPass(additiveBlendShader, 'baseTexture');
    blendPass.needsSwap = true;
    // Set bloom texture AFTER construction to avoid clone error
    blendPass.uniforms.bloomTexture.value = bloomComposer.renderTarget2.texture;
    finalComposer.addPass(blendPass);
    finalComposer.addPass(new OutputPass());

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    let mixer = null;
    let currentAction = null;
    let allClips = [];

    function playAnimation(index) {
      if (!mixer || !allClips.length) return;
      if (currentAction) currentAction.fadeOut(0.3);
      const action = mixer.clipAction(allClips[index]);
      action.reset();
      action.setLoop(THREE.LoopRepeat, Infinity);
      action.fadeIn(0.3);
      action.play();
      currentAction = action;
      log('▶ ' + allClips[index].name);
    }

    const loader = new GLTFLoader();
    loader.load(
      'web/public/assets/models/glow_whale_mr.glb',
      (gltf) => {
        log('✓ Model loaded');

        const box = new THREE.Box3().setFromObject(gltf.scene);
        const center = box.getCenter(new THREE.Vector3());
        gltf.scene.position.sub(center);

        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        camera.position.set(maxDim * 0.8, maxDim * 0.3, maxDim * 1.5);
        camera.lookAt(0, 0, 0);
        controls.target.set(0, 0, 0);
        controls.update();

        // Tag emissive meshes for selective bloom
        gltf.scene.traverse((child) => {
          if (child.isMesh) {
            const m = child.material;
            log(`"${child.name}" emI=${m.emissiveIntensity} map=${!!m.map}`);
            // If the mesh has high emissive intensity, put it on bloom layer
            if (m.emissiveIntensity > 1.0) {
              child.layers.enable(BLOOM_LAYER);
              log(`  → bloom layer enabled`);
            }
          }
        });

        mixer = new THREE.AnimationMixer(gltf.scene);
        allClips = gltf.animations;
        allClips.forEach((clip, i) => {
          const opt = document.createElement('option');
          opt.value = i;
          opt.textContent = `${clip.name} (${clip.duration.toFixed(1)}s)`;
          animSelect.appendChild(opt);
        });
        animSelect.addEventListener('change', () => playAnimation(parseInt(animSelect.value)));
        playAnimation(0);

        scene.add(gltf.scene);
        log('--- Ready ---');
      },
      (progress) => {
        if (progress.total > 0) {
          infoEl.textContent = `Loading: ${((progress.loaded / progress.total) * 100).toFixed(0)}%\n`;
        }
      },
      (error) => log('ERROR: ' + error.message)
    );

    // Sliders
    const sliders = {
      bloomStrength: { target: () => [bloomPass], prop: 'strength' },
      bloomRadius: { target: () => [bloomPass], prop: 'radius' },
      bloomThreshold: { target: () => [bloomPass], prop: 'threshold' },
      exposure: { target: () => [renderer], prop: 'toneMappingExposure' },
      ambientIntensity: { target: () => [ambientLight], prop: 'intensity' },
      keyLightIntensity: { target: () => [keyLight], prop: 'intensity' },
    };
    for (const [id, cfg] of Object.entries(sliders)) {
      const el = document.getElementById(id);
      const valEl = document.getElementById(id + 'Val');
      el.addEventListener('input', () => {
        const v = parseFloat(el.value);
        valEl.textContent = v;
        for (const obj of cfg.target()) obj[cfg.prop] = v;
      });
    }

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      if (mixer) mixer.update(clock.getDelta());
      controls.update();

      // 1. Render bloom pass — darken non-emissive, bloom only tagged meshes
      scene.traverse(darkenNonBloomed);
      bloomComposer.render();
      scene.traverse(restoreMaterial);

      // 2. Render final scene + additive bloom overlay
      finalComposer.render();
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      bloomComposer.setSize(window.innerWidth, window.innerHeight);
      finalComposer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
